<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة المشاريع | اللجنة العلمية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .fade-in { animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(15px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        /* تصميم شريط التمرير */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex flex-col selection:bg-blue-200 selection:text-blue-900">

    <nav class="bg-gradient-to-r from-slate-900 to-blue-900 text-white p-4 shadow-lg sticky top-0 z-20">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold cursor-pointer flex items-center gap-3 hover:text-blue-200 transition" onclick="goHome()">
                <span class="text-3xl">🎓</span> 
                <span>بوابة المشاريع الأكاديمية</span>
            </h1>
            <div class="hidden md:flex items-center gap-2">
                <span class="bg-blue-800/50 text-blue-100 text-xs font-semibold px-3 py-1.5 rounded-full border border-blue-700">اللجنة العلمية</span>
            </div>
        </div>
    </nav>

    <div class="bg-white border-b border-slate-200 shadow-sm">
        <div class="max-w-6xl mx-auto px-6 py-3 text-sm font-medium text-slate-500" id="breadcrumbs">
            </div>
    </div>

    <main class="max-w-6xl mx-auto p-6 mt-4 flex-grow w-full" id="app">
        </main>

    <footer class="bg-slate-900 text-slate-400 py-8 text-center mt-auto">
        <div class="max-w-6xl mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-4">
            <p>&copy; 2026 نظام إدارة الصلاحيات عبر Notion.</p>
            <div class="flex gap-4 text-sm">
                <span class="hover:text-white cursor-pointer transition">الدعم الفني</span>
                <span class="hover:text-white cursor-pointer transition">دليل الاستخدام</span>
            </div>
        </div>
    </footer>

    <script>
        // --- 1. قاعدة البيانات ---
        const siteData = {
            departments: [
                {
                    code: "EE",
                    name: "الهندسة الكهربائية (Electrical Engineering)",
                    description: "مشاريع وتطبيقات قسم الهندسة الكهربائية، تشمل تصميم المنطق الرقمي، تحليل الدوائر، وأنظمة التحكم.",
                    projects: [
                        { id: "EE-P001", title: "Digital Logic Design & Automation System", status: "In Progress", supervisor: "Dr. Ahmed", student_url: "https://notion.so/", tamkeen_url: "https://notion.so/" },
                        { id: "EE-P002", title: "Signals and Systems Analyzer", status: "Completed", supervisor: "Dr. Khalid", student_url: "https://notion.so/", tamkeen_url: "https://notion.so/" },
                        { id: "EE-P003", title: "Smart Grid Monitoring", status: "In Progress", supervisor: "Dr. Yasser", student_url: "https://notion.so/", tamkeen_url: "https://notion.so/", optional_links: [{ label: "مجلد المخططات", url: "#" }] }
                    ]
                },
                {
                    code: "CSE",
                    name: "علوم وهندسة الحاسب (Computer Science & Eng)",
                    description: "مشاريع البرمجة، خوارزميات الذكاء الاصطناعي، وهندسة البرمجيات.",
                    projects: [
                        { id: "CSE-P001", title: "Student Portal Web Development", status: "In Progress", supervisor: "Dr. Salem", student_url: "https://notion.so/", tamkeen_url: "https://notion.so/" },
                        { id: "CSE-P002", title: "Medical Tools App", status: "Completed", supervisor: "Dr. Omar", student_url: "https://notion.so/", tamkeen_url: "https://notion.so/" }
                    ]
                },
                {
                    code: "ME",
                    name: "الهندسة الميكانيكية (Mechanical Engineering)",
                    description: "مشاريع التصميم الميكانيكي، الديناميكا الحرارية، والروبوتات.",
                    projects: []
                }
            ]
        };

        // --- 2. إدارة الحالة (State Management) ---
        let state = {
            view: 'home', // home, dept, project
            activeDeptIndex: null,
            activeProjIndex: null,
            searchQuery: '',
            statusFilter: 'All'
        };

        const appDiv = document.getElementById('app');
        const breadcrumbsDiv = document.getElementById('breadcrumbs');

        // --- 3. دوال التحديث (Render Functions) ---

        function updateBreadcrumbs() {
            let html = `<span class="cursor-pointer hover:text-blue-600 transition" onclick="goHome()">🏠 الرئيسية</span>`;
            
            if (state.view === 'dept' || state.view === 'project') {
                const dept = siteData.departments[state.activeDeptIndex];
                html += ` <span class="mx-2 text-slate-300">/</span> <span class="cursor-pointer hover:text-blue-600 transition" onclick="goDept(${state.activeDeptIndex})">${dept.code}</span>`;
            }
            if (state.view === 'project') {
                const proj = siteData.departments[state.activeDeptIndex].projects[state.activeProjIndex];
                html += ` <span class="mx-2 text-slate-300">/</span> <span class="text-slate-800 font-bold">${proj.id}</span>`;
            }
            breadcrumbsDiv.innerHTML = html;
        }

        // ألوان الحالات (Helper)
        function getStatusBadge(status) {
            const colors = {
                'Completed': 'bg-emerald-100 text-emerald-800 border-emerald-200',
                'In Progress': 'bg-blue-100 text-blue-800 border-blue-200',
                'Pending': 'bg-amber-100 text-amber-800 border-amber-200'
            };
            const colorClass = colors[status] || 'bg-slate-100 text-slate-800 border-slate-200';
            return `<span class="inline-block ${colorClass} border text-xs font-bold px-3 py-1 rounded-full">${status}</span>`;
        }

        // شريط البحث والفلترة (Component)
        function renderSearchFilter() {
            return `
                <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 mb-8 flex flex-col md:flex-row gap-4">
                    <div class="relative flex-grow">
                        <span class="absolute inset-y-0 right-0 flex items-center pr-3 text-slate-400">🔍</span>
                        <input type="text" id="searchInput" placeholder="ابحث عن مشروع بالاسم أو المعرف..." 
                               value="${state.searchQuery}" onkeyup="handleSearch(this.value)"
                               class="w-full pl-4 pr-10 py-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition">
                    </div>
                    <select id="statusFilter" onchange="handleFilter(this.value)" 
                            class="w-full md:w-48 px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition cursor-pointer">
                        <option value="All" ${state.statusFilter === 'All' ? 'selected' : ''}>جميع الحالات</option>
                        <option value="In Progress" ${state.statusFilter === 'In Progress' ? 'selected' : ''}>قيد التنفيذ (In Progress)</option>
                        <option value="Completed" ${state.statusFilter === 'Completed' ? 'selected' : ''}>مكتمل (Completed)</option>
                    </select>
                </div>
            `;
        }

        function renderHome() {
            updateBreadcrumbs();
            
            // إذا كان هناك بحث أو فلترة، نعرض كل المشاريع المطابقة
            if (state.searchQuery || state.statusFilter !== 'All') {
                renderSearchResults();
                return;
            }

            let html = `
                <div class="fade-in">
                    ${renderSearchFilter()}
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mt-4">
            `;
            
            siteData.departments.forEach((dept, index) => {
                html += `
                    <div onclick="goDept(${index})" class="group bg-white p-8 rounded-2xl shadow-sm border border-slate-200 hover:shadow-xl hover:border-blue-400 hover:-translate-y-1 transition-all duration-300 cursor-pointer relative overflow-hidden">
                        <div class="absolute top-0 right-0 w-32 h-32 bg-gradient-to-br from-blue-50 to-transparent rounded-bl-full -z-10 opacity-50"></div>
                        <div class="flex justify-between items-center mb-6">
                            <h3 class="text-3xl font-extrabold text-slate-800 group-hover:text-blue-700 transition">${dept.code}</h3>
                            <span class="bg-blue-50 text-blue-700 text-sm font-bold px-4 py-1.5 rounded-full border border-blue-100">${dept.projects.length} مشاريع</span>
                        </div>
                        <p class="text-slate-600 font-medium leading-relaxed">${dept.name}</p>
                    </div>
                `;
            });
            html += `</div></div>`;
            appDiv.innerHTML = html;
            
            // إعادة التركيز على حقل البحث إذا كان المستخدم يكتب
            if(state.searchQuery) document.getElementById('searchInput').focus();
        }

        // عرض نتائج البحث العامة
        function renderSearchResults() {
            let html = `<div class="fade-in">${renderSearchFilter()}<h3 class="text-xl font-bold text-slate-800 mb-6">نتائج البحث</h3><div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">`;
            
            let foundCount = 0;
            siteData.departments.forEach((dept, dIndex) => {
                dept.projects.forEach((proj, pIndex) => {
                    const matchSearch = proj.title.toLowerCase().includes(state.searchQuery.toLowerCase()) || proj.id.toLowerCase().includes(state.searchQuery.toLowerCase());
                    const matchStatus = state.statusFilter === 'All' || proj.status === state.statusFilter;
                    
                    if (matchSearch && matchStatus) {
                        foundCount++;
                        html += createProjectCard(proj, dept.code, dIndex, pIndex);
                    }
                });
            });

            if (foundCount === 0) {
                html += `<div class="col-span-full bg-white p-12 text-center rounded-2xl border border-slate-200 shadow-sm flex flex-col items-center justify-center">
                            <span class="text-5xl mb-4">📭</span>
                            <h3 class="text-xl font-bold text-slate-700 mb-2">لا توجد نتائج مطابقة</h3>
                            <p class="text-slate-500">جرب البحث بكلمات مختلفة أو تغيير إعدادات الفلتر.</p>
                            <button onclick="clearSearch()" class="mt-6 text-blue-600 hover:underline font-semibold">مسح البحث</button>
                         </div>`;
            }
            html += `</div></div>`;
            appDiv.innerHTML = html;
            document.getElementById('searchInput').focus();
        }

        // بطاقة المشروع (مستخدمة في أكثر من مكان)
        function createProjectCard(project, deptCode, dIndex, pIndex) {
            return `
                <div onclick="goProject(${dIndex}, ${pIndex})" class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 hover:shadow-lg hover:border-blue-400 transition-all cursor-pointer flex flex-col h-full">
                    <div class="flex justify-between items-start mb-4">
                        <span class="text-xs font-black text-slate-400 bg-slate-100 px-2 py-1 rounded">${project.id}</span>
                        ${getStatusBadge(project.status)}
                    </div>
                    <h4 class="text-lg font-bold text-slate-800 mb-4 flex-grow">${project.title}</h4>
                    <div class="text-sm text-slate-500 border-t border-slate-100 pt-4 flex justify-between items-center">
                        <span class="flex items-center gap-1">👤 ${project.supervisor}</span>
                        <span class="bg-blue-50 text-blue-600 px-2 py-1 rounded text-xs font-bold">${deptCode}</span>
                    </div>
                </div>
            `;
        }

        function renderDepartment() {
            updateBreadcrumbs();
            const dept = siteData.departments[state.activeDeptIndex];
            
            let html = `
                <div class="fade-in">
                    <div class="bg-gradient-to-r from-blue-900 to-slate-800 text-white p-8 rounded-2xl shadow-md mb-8 relative overflow-hidden">
                        <div class="absolute -right-10 -top-10 opacity-10 text-9xl font-black">${dept.code}</div>
                        <h2 class="text-3xl font-bold mb-3 relative z-10">${dept.name}</h2>
                        <p class="text-blue-100 relative z-10 max-w-2xl">${dept.description}</p>
                    </div>
                    
                    <div class="flex justify-between items-end mb-6">
                        <h3 class="text-2xl font-bold text-slate-800">مشاريع القسم</h3>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            `;

            if(dept.projects.length === 0) {
                html += `<div class="col-span-full bg-slate-50 p-12 text-center rounded-xl border-2 border-dashed border-slate-300 text-slate-500">
                            لا توجد مشاريع مضافة حالياً في هذا القسم.
                         </div>`;
            } else {
                dept.projects.forEach((project, pIndex) => {
                    html += createProjectCard(project, dept.code, state.activeDeptIndex, pIndex);
                });
            }
            html += `</div></div>`;
            appDiv.innerHTML = html;
        }

        function renderProject() {
            updateBreadcrumbs();
            const dept = siteData.departments[state.activeDeptIndex];
            const project = dept.projects[state.activeProjIndex];

            let html = `
                <div class="fade-in max-w-4xl mx-auto">
                    <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-200">
                        <div class="text-center mb-10 border-b border-slate-100 pb-8">
                            <span class="bg-slate-100 text-slate-600 text-sm font-bold px-4 py-1.5 rounded-full mb-4 inline-block tracking-widest">${project.id}</span>
                            <h2 class="text-4xl font-extrabold text-slate-800 mb-6 leading-snug">${project.title}</h2>
                            <div class="flex flex-wrap justify-center gap-4 text-sm font-medium text-slate-600">
                                <span class="bg-slate-50 px-4 py-2 rounded-lg border border-slate-200 flex items-center gap-2">👤 المشرف: ${project.supervisor}</span>
                                <span class="bg-slate-50 px-4 py-2 rounded-lg border border-slate-200 flex items-center gap-2">📊 الحالة: ${getStatusBadge(project.status)}</span>
                            </div>
                        </div>

                        <div class="space-y-6">
                            <a href="${project.student_url}" target="_blank" rel="noopener noreferrer" 
                               class="group flex items-center justify-between w-full bg-white hover:bg-slate-50 text-slate-800 font-bold py-6 px-8 rounded-2xl border-2 border-slate-200 hover:border-blue-400 transition-all shadow-sm">
                                <div class="flex items-center gap-6">
                                    <div class="bg-blue-100 p-4 rounded-xl text-4xl">👨‍🎓</div>
                                    <div class="text-right">
                                        <div class="text-xl text-slate-800">صفحة الطلاب (Student Page)</div>
                                        <div class="text-sm text-slate-500 font-normal mt-1">تتطلب صلاحية الوصول كطالب في مساحة العمل</div>
                                    </div>
                                </div>
                                <span class="text-slate-300 group-hover:text-blue-500 text-2xl transition-colors">&larr;</span>
                            </a>
                            
                            <a href="${project.tamkeen_url}" target="_blank" rel="noopener noreferrer" 
                               class="group flex items-center justify-between w-full bg-slate-900 hover:bg-blue-900 text-white font-bold py-6 px-8 rounded-2xl border-2 border-transparent transition-all shadow-md hover:shadow-xl">
                                <div class="flex items-center gap-6">
                                    <div class="bg-slate-800 group-hover:bg-blue-800 p-4 rounded-xl text-4xl transition-colors">🏢</div>
                                    <div class="text-right">
                                        <div class="text-xl">صفحة التمكين (Tamkeen Page)</div>
                                        <div class="text-sm text-slate-400 font-normal mt-1">خاصة بإدارة التمكين والتقييم النهائي</div>
                                    </div>
                                </div>
                                <span class="text-slate-500 group-hover:text-blue-300 text-2xl transition-colors">&larr;</span>
                            </a>
            `;

            // الروابط الاختيارية (مثل ملفات Drive أو GitHub)
            if(project.optional_links && project.optional_links.length > 0) {
                html += `
                    <div class="mt-10 pt-8 border-t border-slate-100">
                        <h4 class="text-sm font-bold text-slate-400 mb-4 uppercase tracking-wider">روابط إضافية ومرفقات</h4>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                `;
                project.optional_links.forEach(link => {
                    html += `
                        <a href="${link.url}" target="_blank" rel="noopener noreferrer" 
                           class="flex items-center gap-3 w-full bg-slate-50 hover:bg-slate-100 text-slate-700 font-semibold py-4 px-5 rounded-xl border border-slate-200 hover:border-blue-300 transition-all">
                            <span class="text-xl">🔗</span> ${link.label}
                        </a>
                    `;
                });
                html += `</div></div>`;
            }

            html += `
                        </div>
                    </div>
                </div>
            `;
            appDiv.innerHTML = html;
        }

        // --- 4. دوال التحكم والتنقل (Actions) ---
        
        function goHome() {
            state.view = 'home';
            state.activeDeptIndex = null;
            state.activeProjIndex = null;
            renderHome();
        }

        function goDept(deptIndex) {
            state.view = 'dept';
            state.activeDeptIndex = deptIndex;
            state.activeProjIndex = null;
            state.searchQuery = ''; 
            state.statusFilter = 'All';
            renderDepartment();
        }

        function goProject(deptIndex, projIndex) {
            state.view = 'project';
            state.activeDeptIndex = deptIndex;
            state.activeProjIndex = projIndex;
            renderProject();
        }

        function handleSearch(query) {
            state.searchQuery = query;
            if(state.view === 'home') renderHome();
        }

        function handleFilter(status) {
            state.statusFilter = status;
            if(state.view === 'home') renderHome();
        }

        function clearSearch() {
            state.searchQuery = '';
            state.statusFilter = 'All';
            if(state.view === 'home') renderHome();
        }

        // --- بدء التشغيل ---
        goHome();
    </script>
</body>
</html>
