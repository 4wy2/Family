<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة المشاريع | اللجنة العلمية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex flex-col selection:bg-blue-200 selection:text-blue-900">

    <nav class="bg-gradient-to-r from-slate-900 to-blue-900 text-white p-4 shadow-lg sticky top-0 z-20">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold cursor-pointer flex items-center gap-3 hover:text-blue-200 transition" onclick="goHome()">
                <span class="text-3xl">🎓</span> 
                <span>بوابة المشاريع الأكاديمية</span>
            </h1>
            <div class="hidden md:flex items-center gap-2">
                <span class="bg-blue-800/50 text-blue-100 text-xs font-semibold px-3 py-1.5 rounded-full border border-blue-700">اللجنة العلمية</span>
            </div>
        </div>
    </nav>

    <div class="bg-white border-b border-slate-200 shadow-sm">
        <div class="max-w-6xl mx-auto px-6 py-3 text-sm font-medium text-slate-500" id="breadcrumbs"></div>
    </div>

    <main class="max-w-6xl mx-auto p-6 mt-4 flex-grow w-full" id="app">
        <div class="flex flex-col items-center justify-center py-32 fade-in">
            <div class="animate-spin rounded-full h-12 w-12 border-b-4 border-blue-700 mb-4"></div>
            <p class="text-slate-500 font-bold">جاري المزامنة...</p>
        </div>
    </main>

    <footer class="bg-slate-900 text-slate-400 py-8 text-center mt-auto">
        <div class="max-w-6xl mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-4">
            <p>&copy; 2026 نظام إدارة الصلاحيات عبر Notion.</p>
        </div>
    </footer>

    <script>
        let siteData = { departments: [] };
        
        // رابط ملفك
        const GOOGLE_SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTvwBCRNKVIlbxlpTPNwLt0nDLb4SvYqDc1DjpzEHOivVLolDZAo5UUjkjpi8CzNvWHa3JVuYRIS_uC/pub?output=csv";

        async function fetchAndBuildData() {
            let csvText = "";
            try {
                // 1. المحاولة الصاروخية (مباشرة لسيرفرات جوجل)
                const response = await fetch(GOOGLE_SHEET_CSV_URL);
                if (!response.ok) throw new Error("فشل الاتصال المباشر");
                csvText = await response.text();
            } catch (directError) {
                try {
                    // 2. الخطة البديلة (في حال منع المتصفح الاتصال المباشر)
                    const PROXY_URL = "https://api.allorigins.win/raw?url=";
                    const fallbackResponse = await fetch(PROXY_URL + encodeURIComponent(GOOGLE_SHEET_CSV_URL));
                    csvText = await fallbackResponse.text();
                } catch (proxyError) {
                    document.getElementById('app').innerHTML = `<div class="bg-red-50 p-8 text-center text-red-700 rounded-3xl border border-red-200 shadow-sm max-w-2xl mx-auto text-lg"><span class="text-5xl mb-4 block">⚠️</span><b>تعذر سحب البيانات تماماً. تأكد من اتصالك بالإنترنت.</b></div>`;
                    return;
                }
            }

            // معالجة البيانات وتحويلها
            Papa.parse(csvText, {
                header: true,
                skipEmptyLines: true,
                transformHeader: function(header) { return header.trim(); },
                complete: function(results) {
                    try {
                        if (!results || !results.data || results.data.length === 0) throw new Error("الملف فارغ.");
                        
                        buildSiteData(results.data);
                        if(siteData.departments.length === 0) throw new Error("لا توجد مشاريع مسجلة في الإكسل.");
                        
                        goHome(); // تشغيل الواجهة
                    } catch (e) {
                        document.getElementById('app').innerHTML = `<div class="bg-amber-50 p-8 text-center text-amber-700 rounded-3xl border border-amber-200 shadow-sm max-w-2xl mx-auto text-lg"><span class="text-5xl mb-4 block">⚠️</span><b>تنبيه:</b><br>${e.message}</div>`;
                    }
                }
            });
        }

        function buildSiteData(rows) {
            let deptMap = {};
            rows.forEach(row => {
                let deptCode = row['رمز القسم'];
                let deptName = row['اسم القسم'];
                let projId = row['معرف المشروع'];
                let title = row['العنوان'];
                let status = row['الحالة'] || "Pending";
                let supervisor = row['المشرف'] || "غير محدد";
                let student_url = row['رابط المشروع'] || "#";
                let tamkeen_url = row['رابط تمكين'] || "#";

                if(!deptCode || !projId) return; 

                if(!deptMap[deptCode]) {
                    deptMap[deptCode] = {
                        code: deptCode,
                        name: deptName || deptCode,
                        description: "مشاريع وتطبيقات قسم " + (deptName || deptCode),
                        projects: []
                    };
                }

                deptMap[deptCode].projects.push({
                    id: projId,
                    title: title,
                    status: status,
                    supervisor: supervisor,
                    student_url: student_url,
                    tamkeen_url: tamkeen_url
                });
            });
            siteData.departments = Object.values(deptMap);
        }

        // --- إدارة الحالة والتنقل ---
        let state = { view: 'home', activeDeptIndex: null, activeProjIndex: null, searchQuery: '', statusFilter: 'All' };
        const appDiv = document.getElementById('app');
        const breadcrumbsDiv = document.getElementById('breadcrumbs');

        function updateBreadcrumbs() {
            let html = `<span class="cursor-pointer hover:text-blue-600 transition font-bold" onclick="goHome()">🏠 الرئيسية</span>`;
            if (state.view === 'dept' || state.view === 'project') {
                const dept = siteData.departments[state.activeDeptIndex];
                html += ` <span class="mx-2 text-slate-300">/</span> <span class="cursor-pointer hover:text-blue-600 transition font-bold" onclick="goDept(${state.activeDeptIndex})">${dept.code}</span>`;
            }
            if (state.view === 'project') {
                const proj = siteData.departments[state.activeDeptIndex].projects[state.activeProjIndex];
                html += ` <span class="mx-2 text-slate-300">/</span> <span class="text-slate-800 font-bold">${proj.id}</span>`;
            }
            breadcrumbsDiv.innerHTML = html;
        }

        function getStatusBadge(status) {
            const colors = {
                'Completed': 'bg-emerald-100 text-emerald-800 border-emerald-200',
                'In Progress': 'bg-blue-100 text-blue-800 border-blue-200',
                'Pending': 'bg-amber-100 text-amber-800 border-amber-200'
            };
            const colorClass = colors[status] || 'bg-slate-100 text-slate-800 border-slate-200';
            return `<span class="inline-block ${colorClass} border text-xs font-bold px-3 py-1 rounded-full">${status}</span>`;
        }

        function renderSearchFilter() {
            return `
                <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 mb-8 flex flex-col md:flex-row gap-4">
                    <div class="relative flex-grow">
                        <span class="absolute inset-y-0 right-0 flex items-center pr-3 text-slate-400">🔍</span>
                        <input type="text" id="searchInput" placeholder="ابحث عن مشروع بالاسم أو المعرف..." 
                               value="${state.searchQuery}" onkeyup="handleSearch(this.value)"
                               class="w-full pl-4 pr-10 py-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition">
                    </div>
                    <select id="statusFilter" onchange="handleFilter(this.value)" 
                            class="w-full md:w-48 px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition cursor-pointer font-semibold">
                        <option value="All" ${state.statusFilter === 'All' ? 'selected' : ''}>جميع الحالات</option>
                        <option value="In Progress" ${state.statusFilter === 'In Progress' ? 'selected' : ''}>قيد التنفيذ (In Progress)</option>
                        <option value="Completed" ${state.statusFilter === 'Completed' ? 'selected' : ''}>مكتمل (Completed)</option>
                    </select>
                </div>
            `;
        }

        function createProjectCard(project, deptCode, dIndex, pIndex) {
            return `
                <div onclick="goProject(${dIndex}, ${pIndex})" class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 hover:shadow-lg hover:border-blue-400 transition-all cursor-pointer flex flex-col h-full">
                    <div class="flex justify-between items-start mb-4">
                        <span class="text-xs font-black text-slate-500 bg-slate-100 px-3 py-1.5 rounded-md border">${project.id}</span>
                        ${getStatusBadge(project.status)}
                    </div>
                    <h4 class="text-xl font-bold text-slate-800 mb-4 flex-grow leading-snug">${project.title}</h4>
                    <div class="text-sm text-slate-500 border-t border-slate-100 pt-4 flex justify-between items-center font-semibold">
                        <span class="flex items-center gap-2">👤 ${project.supervisor}</span>
                        <span class="bg-blue-50 text-blue-700 px-3 py-1 rounded-md border border-blue-100 text-xs">${deptCode}</span>
                    </div>
                </div>
            `;
        }

        function renderHome() {
            updateBreadcrumbs();
            if (state.searchQuery || state.statusFilter !== 'All') {
                renderSearchResults();
                return;
            }

            let html = `<div class="fade-in">${renderSearchFilter()}<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mt-4">`;
            siteData.departments.forEach((dept, index) => {
                html += `
                    <div onclick="goDept(${index})" class="group bg-white p-8 rounded-2xl shadow-sm border border-slate-200 hover:shadow-xl hover:border-blue-500 hover:-translate-y-1 transition-all duration-300 cursor-pointer relative overflow-hidden">
                        <div class="absolute top-0 right-0 w-32 h-32 bg-gradient-to-br from-blue-50 to-transparent rounded-bl-full -z-10 opacity-60"></div>
                        <div class="flex justify-between items-center mb-6">
                            <h3 class="text-4xl font-extrabold text-slate-800 group-hover:text-blue-700 transition">${dept.code}</h3>
                            <span class="bg-blue-50 text-blue-700 text-sm font-bold px-4 py-1.5 rounded-full border border-blue-200 shadow-sm">${dept.projects.length} مشاريع</span>
                        </div>
                        <p class="text-slate-600 font-medium leading-relaxed text-lg">${dept.name}</p>
                    </div>
                `;
            });
            html += `</div></div>`;
            appDiv.innerHTML = html;
            if(state.searchQuery) document.getElementById('searchInput').focus();
        }

        function renderSearchResults() {
            let html = `<div class="fade-in">${renderSearchFilter()}<h3 class="text-2xl font-bold text-slate-800 mb-6">نتائج البحث</h3><div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">`;
            let foundCount = 0;
            siteData.departments.forEach((dept, dIndex) => {
                dept.projects.forEach((proj, pIndex) => {
                    const matchSearch = proj.title.toLowerCase().includes(state.searchQuery.toLowerCase()) || proj.id.toLowerCase().includes(state.searchQuery.toLowerCase());
                    const matchStatus = state.statusFilter === 'All' || proj.status === state.statusFilter;
                    if (matchSearch && matchStatus) {
                        foundCount++;
                        html += createProjectCard(proj, dept.code, dIndex, pIndex);
                    }
                });
            });

            if (foundCount === 0) {
                html += `<div class="col-span-full bg-white p-12 text-center rounded-2xl border border-slate-200 shadow-sm flex flex-col items-center justify-center">
                            <span class="text-6xl mb-4">📭</span>
                            <h3 class="text-2xl font-bold text-slate-700 mb-2">لا توجد نتائج مطابقة</h3>
                            <p class="text-slate-500 text-lg">جرب البحث بكلمات مختلفة أو تغيير إعدادات الفلتر.</p>
                            <button onclick="clearSearch()" class="mt-6 text-blue-600 hover:underline font-bold text-lg">مسح البحث</button>
                         </div>`;
            }
            html += `</div></div>`;
            appDiv.innerHTML = html;
        }

        function renderDepartment() {
            updateBreadcrumbs();
            const dept = siteData.departments[state.activeDeptIndex];
            
            let html = `
                <div class="fade-in">
                    <div class="bg-gradient-to-r from-blue-900 to-slate-800 text-white p-10 rounded-2xl shadow-lg mb-10 relative overflow-hidden">
                        <div class="absolute -right-10 -top-10 opacity-10 text-9xl font-black">${dept.code}</div>
                        <h2 class="text-4xl font-extrabold mb-4 relative z-10">${dept.name}</h2>
                        <p class="text-blue-100 relative z-10 max-w-2xl text-lg leading-relaxed">${dept.description}</p>
                    </div>
                    <div class="flex justify-between items-end mb-6">
                        <h3 class="text-3xl font-bold text-slate-800">مشاريع القسم</h3>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            `;

            if(dept.projects.length === 0) {
                html += `<div class="col-span-full bg-slate-50 p-16 text-center rounded-2xl border-2 border-dashed border-slate-300 text-slate-500 font-semibold text-lg">لا توجد مشاريع مضافة حالياً في هذا القسم.</div>`;
            } else {
                dept.projects.forEach((project, pIndex) => {
                    html += createProjectCard(project, dept.code, state.activeDeptIndex, pIndex);
                });
            }
            html += `</div></div>`;
            appDiv.innerHTML = html;
        }

        function renderProject() {
            updateBreadcrumbs();
            const dept = siteData.departments[state.activeDeptIndex];
            const project = dept.projects[state.activeProjIndex];

            let html = `
                <div class="fade-in max-w-4xl mx-auto">
                    <div class="bg-white p-10 rounded-3xl shadow-sm border border-slate-200">
                        <div class="text-center mb-12 border-b border-slate-100 pb-10">
                            <span class="bg-slate-100 text-slate-600 text-sm font-bold px-5 py-2 rounded-full mb-6 inline-block tracking-widest border border-slate-200 shadow-sm">${project.id}</span>
                            <h2 class="text-4xl md:text-5xl font-extrabold text-slate-800 mb-8 leading-tight">${project.title}</h2>
                            <div class="flex flex-wrap justify-center gap-4 text-sm font-bold text-slate-700">
                                <span class="bg-slate-50 px-5 py-2.5 rounded-lg border border-slate-200 flex items-center gap-2 shadow-sm">👤 المشرف: ${project.supervisor}</span>
                                <span class="bg-slate-50 px-5 py-2.5 rounded-lg border border-slate-200 flex items-center gap-2 shadow-sm">📊 الحالة: ${getStatusBadge(project.status)}</span>
                            </div>
                        </div>

                        <div class="space-y-6">
                            <a href="${project.student_url}" target="_blank" rel="noopener noreferrer" 
                               class="group flex items-center justify-between w-full bg-white hover:bg-slate-50 text-slate-800 font-bold py-6 px-8 rounded-2xl border-2 border-slate-200 hover:border-blue-500 transition-all shadow-sm hover:shadow-md">
                                <div class="flex items-center gap-6">
                                    <div class="bg-blue-100 p-4 rounded-xl text-4xl shadow-sm">👨‍🎓</div>
                                    <div class="text-right">
                                        <div class="text-2xl text-slate-800 mb-1">صفحة الطلاب (Student Page)</div>
                                        <div class="text-sm text-slate-500 font-semibold">تتطلب صلاحية الوصول كطالب في مساحة العمل</div>
                                    </div>
                                </div>
                                <span class="text-slate-300 group-hover:text-blue-500 text-3xl transition-colors">&larr;</span>
                            </a>
                            
                            <a href="${project.tamkeen_url}" target="_blank" rel="noopener noreferrer" 
                               class="group flex items-center justify-between w-full bg-slate-900 hover:bg-blue-900 text-white font-bold py-6 px-8 rounded-2xl border-2 border-transparent transition-all shadow-lg hover:shadow-xl hover:-translate-y-1">
                                <div class="flex items-center gap-6">
                                    <div class="bg-slate-800 group-hover:bg-blue-800 p-4 rounded-xl text-4xl transition-colors shadow-inner">🏢</div>
                                    <div class="text-right">
                                        <div class="text-2xl mb-1">صفحة التمكين (Tamkeen Page)</div>
                                        <div class="text-sm text-blue-200 font-semibold">خاصة بإدارة التمكين والتقييم النهائي</div>
                                    </div>
                                </div>
                                <span class="text-slate-500 group-hover:text-blue-300 text-3xl transition-colors">&larr;</span>
                            </a>
                        </div>
                    </div>
                </div>
            `;
            appDiv.innerHTML = html;
        }

        // --- دوال التنقل ---
        function goHome() { state.view = 'home'; state.activeDeptIndex = null; state.activeProjIndex = null; renderHome(); }
        function goDept(dIndex) { state.view = 'dept'; state.activeDeptIndex = dIndex; state.activeProjIndex = null; state.searchQuery = ''; state.statusFilter = 'All'; renderDepartment(); }
        function goProject(dIndex, pIndex) { state.view = 'project'; state.activeDeptIndex = dIndex; state.activeProjIndex = pIndex; renderProject(); }
        function handleSearch(q) { state.searchQuery = q; if(state.view === 'home') renderHome(); }
        function handleFilter(s) { state.statusFilter = s; if(state.view === 'home') renderHome(); }
        function clearSearch() { state.searchQuery = ''; state.statusFilter = 'All'; if(state.view === 'home') renderHome(); }

        fetchAndBuildData();
    </script>
</body>
</html>
