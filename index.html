<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بوابة المشاريع | الإدارة العليا</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        
        .fade-in { animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards; opacity: 0; }
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(15px) scale(0.98); } 
            to { opacity: 1; transform: translateY(0) scale(1); } 
        }
        
        /* تحسين السكرولبار للاب توب */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 8px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* إخفاء السكرولبار للقوائم الأفقية في الجوال لتبدو كتطبيق */
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        
        @media print {
            body { background: white !important; }
            .no-print, #breadcrumbs { display: none !important; }
            .print-break { page-break-inside: avoid; margin-bottom: 24px; }
            .shadow-sm, .shadow-md, .border { box-shadow: none !important; border: 1px solid #cbd5e1 !important; }
            #app { padding: 0 !important; margin-top: 0 !important; max-width: 100% !important; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        }
    </style>
</head>
<body class="text-slate-800 min-h-screen flex flex-col selection:bg-blue-200 selection:text-blue-900 pb-[env(safe-area-inset-bottom)]">

    <nav class="bg-slate-900 text-white shadow-lg sticky top-0 z-50 border-b-4 border-blue-600 no-print">
        <div class="max-w-7xl mx-auto px-4 md:px-6 py-3 md:py-4 flex justify-between items-center gap-2 md:gap-4">
            <div class="flex items-center gap-3 cursor-pointer hover:opacity-80 active:scale-[0.98] transition-all" onclick="goHome()">
                <div class="bg-blue-600 p-2 md:p-2.5 rounded-xl shadow-inner flex-shrink-0">
                    <svg class="w-5 h-5 md:w-6 md:h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                </div>
                <div class="flex flex-col">
                    <h1 class="text-base md:text-xl font-black tracking-wide leading-tight truncate max-w-[180px] sm:max-w-none">المنصة المركزية لمشاريع التخرج</h1>
                    <div class="flex items-center gap-1.5 md:gap-2 mt-0.5 md:mt-1 flex-wrap">
                        <p class="text-[10px] md:text-xs text-blue-200 font-bold tracking-wider">متابعة التقدم</p>
                        <span id="currentWeekBadge" class="bg-blue-700/80 border border-blue-500 text-white px-2 py-0.5 rounded-md text-[9px] md:text-[10px] font-bold shadow-sm hidden"></span>
                    </div>
                </div>
            </div>
            
            <div class="flex items-center gap-3 flex-shrink-0">
                <span id="lastUpdated" class="text-xs text-slate-300 font-semibold hidden lg:block bg-slate-800 px-3 py-1.5 rounded-lg border border-slate-700"></span>
                <button onclick="fetchAndBuildData()" class="flex items-center justify-center bg-blue-600 hover:bg-blue-500 active:bg-blue-700 active:scale-95 text-white w-10 h-10 md:w-auto md:h-auto md:px-5 md:py-2.5 rounded-xl transition-all text-sm font-bold shadow-sm group">
                    <span class="group-hover:rotate-180 transition-transform duration-500 text-lg md:text-base md:ml-2">🔄</span> 
                    <span class="hidden md:inline">تحديث البيانات</span>
                </button>
            </div>
        </div>
    </nav>

    <div class="bg-white border-b border-slate-200 shadow-sm relative z-40 overflow-x-auto whitespace-nowrap hide-scroll">
        <div class="max-w-7xl mx-auto px-4 md:px-6 py-2.5 md:py-3 text-sm font-semibold flex items-center gap-2 min-w-max" id="breadcrumbs"></div>
    </div>

    <main class="max-w-7xl mx-auto px-4 md:px-6 py-6 md:py-8 flex-grow w-full pb-16 md:pb-8" id="app">
        <div class="flex flex-col items-center justify-center py-32 fade-in">
            <div class="animate-spin rounded-full h-12 w-12 border-b-4 border-blue-600 mb-4"></div>
            <p class="text-slate-500 font-bold text-lg">جاري تحميل مساحة العمل...</p>
        </div>
    </main>

    <footer class="bg-white border-t border-slate-200 py-6 text-center mt-auto no-print">
        <div class="max-w-7xl mx-auto px-6">
            <p class="text-sm font-bold text-slate-500">&copy; 2026 كلية ينبع الصناعية</p>
        </div>
    </footer>

    <script>
        const TOTAL_WEEKS = 15; 
        let CURRENT_WEEK = 1; 

        const DEPT_THEMES = {
            'EE':  { color: 'orange', ring: '#f97316', bg: 'bg-orange-50', text: 'text-orange-700', border: 'border-orange-200' },
            'CSE': { color: 'indigo', ring: '#4f46e5', bg: 'bg-indigo-50', text: 'text-indigo-700', border: 'border-indigo-200' },
            'CS':  { color: 'indigo', ring: '#4f46e5', bg: 'bg-indigo-50', text: 'text-indigo-700', border: 'border-indigo-200' },
            'ME':  { color: 'slate', ring: '#475569', bg: 'bg-slate-100', text: 'text-slate-700', border: 'border-slate-300' },
            'MS':  { color: 'purple', ring: '#9333ea', bg: 'bg-purple-50', text: 'text-purple-700', border: 'border-purple-200' },
            'CHE': { color: 'teal', ring: '#0d9488', bg: 'bg-teal-50', text: 'text-teal-700', border: 'border-teal-200' },
            'DEFAULT': { color: 'blue', ring: '#2563eb', bg: 'bg-blue-50', text: 'text-blue-700', border: 'border-blue-200' }
        };

        function getDeptTheme(deptCode) {
            let code = deptCode.toUpperCase().trim();
            if(code.includes('CSE') || code.includes('CS')) return DEPT_THEMES['CSE'];
            return DEPT_THEMES[code] || DEPT_THEMES['DEFAULT'];
        }

        let siteData = { departments: [], stats: { total: 0, completed: 0, inProgress: 0, overallProgress: 0, sumProgress: 0 } };
        let state = { view: 'home', activeDeptIndex: null, activeProjIndex: null, searchQuery: '', statusFilter: 'All', sortFilter: 'default' };
        let searchTimeout = null;
        let mainChartInstance = null; 
        
        const BASE_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTvwBCRNKVIlbxlpTPNwLt0nDLb4SvYqDc1DjpzEHOivVLolDZAo5UUjkjpi8CzNvWHa3JVuYRIS_uC/pub?output=csv";
        const appDiv = document.getElementById('app');

        async function fetchAndBuildData() {
            appDiv.innerHTML = `<div class="flex flex-col items-center justify-center py-32 fade-in"><div class="animate-spin rounded-full h-12 w-12 border-b-4 border-blue-600 mb-4"></div><p class="text-slate-500 font-bold text-lg">مزامنة مؤشرات الأداء...</p></div>`;
            const NO_CACHE_URL = BASE_CSV_URL + "&t=" + new Date().getTime();
            let csvText = "";

            try {
                const response = await fetch(NO_CACHE_URL);
                if (!response.ok) throw new Error("Network");
                csvText = await response.text();
            } catch (e) {
                try {
                    const fallbackResponse = await fetch("https://api.allorigins.win/raw?url=" + encodeURIComponent(NO_CACHE_URL));
                    if (!fallbackResponse.ok) throw new Error("Proxy");
                    csvText = await fallbackResponse.text();
                } catch (err) {
                    appDiv.innerHTML = `<div class="bg-red-50 p-6 md:p-8 text-center border-t-4 border-red-600 rounded-2xl shadow-sm max-w-lg mx-auto m-4"><h2 class="text-xl font-black text-red-800 mb-2">تعذر الاتصال بقاعدة البيانات</h2><p class="text-sm text-red-600 mb-4">الرجاء التحقق من اتصالك بالإنترنت والمحاولة مجدداً.</p><button onclick="fetchAndBuildData()" class="bg-red-600 text-white px-6 py-2.5 rounded-xl font-bold hover:bg-red-700 active:scale-95 transition-all shadow-sm">إعادة المحاولة</button></div>`;
                    return;
                }
            }

            Papa.parse(csvText, {
                header: true, skipEmptyLines: 'greedy',
                transformHeader: h => h ? h.trim() : "",
                complete: function(results) {
                    try {
                        if (!results.data || results.data.length === 0) throw new Error("قاعدة البيانات فارغة.");
                        buildSiteData(results.data);
                        
                        const now = new Date();
                        document.getElementById('lastUpdated').innerText = `التحديث: ${now.toLocaleTimeString('ar-SA')} | الأسبوع: ${CURRENT_WEEK}`;
                        
                        const weekBadge = document.getElementById('currentWeekBadge');
                        if(weekBadge) {
                            weekBadge.innerText = `الأسبوع: ${CURRENT_WEEK}`;
                            weekBadge.classList.remove('hidden');
                        }

                        goHome(); 
                    } catch (e) {
                        appDiv.innerHTML = `<div class="bg-amber-50 p-6 md:p-8 text-center border-t-4 border-amber-500 rounded-2xl shadow-sm max-w-lg mx-auto m-4"><h2 class="text-xl font-black text-amber-800 mb-2">خطأ في هيكلة البيانات</h2><p class="text-amber-700 text-sm">${e.message}</p></div>`;
                    }
                }
            });
        }

        function buildSiteData(rows) {
            let deptMap = {};
            siteData.stats = { total: 0, completed: 0, inProgress: 0, overallProgress: 0, sumProgress: 0 }; 

            for (let i = 0; i < rows.length; i++) {
                if (rows[i]['الأسبوع الحالي'] && rows[i]['الأسبوع الحالي'].trim() !== '') {
                    CURRENT_WEEK = parseInt(rows[i]['الأسبوع الحالي'].trim()) || 1;
                    break;
                }
            }

            rows.forEach(row => {
                let deptCode = (row['رمز القسم'] || "").trim();
                let projId = (row['معرف المشروع'] || "").trim();
                if(!deptCode || !projId) return; 

                let title = (row['العنوان'] || "").trim();
                let status = (row['الحالة'] || "").trim() || "Pending";
                let rawWeeks = (row['الأسابيع المنجزة'] || row['نسبة الإنجاز'] || "0").toString().replace('%', '').trim();
                let completedWeeks = Math.min(TOTAL_WEEKS, Math.max(0, parseInt(rawWeeks) || 0));
                
                if(status === 'Completed' || status === 'مكتمل') completedWeeks = TOTAL_WEEKS;
                let progress = Math.round((completedWeeks / TOTAL_WEEKS) * 100);

                siteData.stats.total++;
                siteData.stats.sumProgress += progress;
                if (completedWeeks === TOTAL_WEEKS) siteData.stats.completed++;
                else siteData.stats.inProgress++;

                if(!deptMap[deptCode]) deptMap[deptCode] = { code: deptCode, name: (row['اسم القسم'] || "").trim() || deptCode, projects: [], sumProgress: 0 };

                deptMap[deptCode].sumProgress += progress;
                deptMap[deptCode].projects.push({
                    id: projId, title: title, status: completedWeeks === TOTAL_WEEKS ? 'مكتمل' : status, 
                    supervisor: (row['المشرف'] || "غير محدد").trim(), 
                    completedWeeks: completedWeeks, progress: progress, 
                    student_url: (row['رابط المشروع'] || "#").trim(), tamkeen_url: (row['رابط تمكين'] || "#").trim()
                });
            });

            siteData.stats.overallProgress = siteData.stats.total > 0 ? Math.round(siteData.stats.sumProgress / siteData.stats.total) : 0;
            Object.values(deptMap).forEach(dept => {
                dept.averageProgress = dept.projects.length > 0 ? Math.round(dept.sumProgress / dept.projects.length) : 0;
            });
            siteData.departments = Object.values(deptMap);
        }

        function updateBreadcrumbs() {
            const b = document.getElementById('breadcrumbs');
            let html = `<button onclick="goHome()" class="text-slate-500 hover:text-blue-700 hover:bg-slate-100 active:scale-95 px-3 py-1.5 rounded-lg transition-all flex items-center gap-1.5 flex-shrink-0"><span class="text-lg">🏠</span> الرئيسية</button>`;
            
            if (state.view === 'dept' || state.view === 'project') {
                const dept = siteData.departments[state.activeDeptIndex];
                html += `<span class="text-slate-300 flex-shrink-0">/</span><button onclick="goDept(${state.activeDeptIndex})" class="text-slate-600 hover:text-blue-700 hover:bg-slate-100 active:scale-95 px-3 py-1.5 rounded-lg transition-all font-bold flex-shrink-0">${dept.name} (${dept.code})</button>`;
            }
            if (state.view === 'project') {
                const proj = siteData.departments[state.activeDeptIndex].projects[state.activeProjIndex];
                html += `<span class="text-slate-300 flex-shrink-0">/</span><span class="text-blue-700 font-bold bg-blue-50 border border-blue-200 px-3 py-1.5 rounded-lg shadow-sm flex-shrink-0">${proj.id}</span>`;
            }
            b.innerHTML = html;
        }

        function getHealthBadge(completedWeeks) {
            if(completedWeeks >= TOTAL_WEEKS) return `<span class="bg-emerald-50 text-emerald-700 text-[10px] sm:text-[11px] font-black px-2 py-1 rounded-md border border-emerald-200 flex items-center gap-1 shadow-sm"><span>✅</span> مكتمل</span>`;
            let diff = CURRENT_WEEK - completedWeeks;
            if(diff <= 0) return `<span class="bg-blue-50 text-blue-700 text-[10px] sm:text-[11px] font-black px-2 py-1 rounded-md border border-blue-200 flex items-center gap-1 shadow-sm"><span>🟢</span> منتظم</span>`;
            return `<span class="bg-red-50 text-red-700 text-[10px] sm:text-[11px] font-black px-2 py-1 rounded-md border border-red-200 flex items-center gap-1 shadow-sm"><span>⚠️</span> متأخر (${diff})</span>`;
        }

        function renderSegmentedBar(completedWeeks) {
            let blocks = '';
            for(let i = 1; i <= TOTAL_WEEKS; i++) {
                let colorClass = i <= completedWeeks ? (completedWeeks === TOTAL_WEEKS ? 'bg-emerald-500' : 'bg-blue-500') : 'bg-slate-200';
                blocks += `<div class="flex-1 h-2 sm:h-2.5 rounded-sm ${colorClass}"></div>`;
            }
            return `<div class="flex w-full gap-[2px] mt-2.5">${blocks}</div>`;
        }

        function renderDashboardStats() {
            return `
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-6 md:mb-8">
                    <div class="bg-white p-5 md:p-6 rounded-2xl border border-slate-200 shadow-sm flex flex-col border-r-4 border-r-blue-600 fade-in" style="animation-delay: 0.1s">
                        <p class="text-slate-500 font-bold text-xs md:text-sm mb-1">متوسط إنجاز الكلية</p>
                        <div class="flex items-end justify-between mt-2">
                            <h3 class="text-3xl md:text-4xl font-black text-slate-800">${siteData.stats.overallProgress}%</h3>
                            <div class="w-16 h-2 bg-slate-100 rounded-full overflow-hidden mb-1.5"><div class="bg-blue-600 h-full" style="width: ${siteData.stats.overallProgress}%"></div></div>
                        </div>
                    </div>
                    <div class="bg-white p-5 md:p-6 rounded-2xl border border-slate-200 shadow-sm flex flex-col border-r-4 border-r-slate-600 fade-in" style="animation-delay: 0.15s">
                        <div class="flex justify-between items-start">
                            <p class="text-slate-500 font-bold text-xs md:text-sm">المشاريع المعتمدة</p>
                            <span class="bg-slate-50 text-slate-500 w-8 h-8 rounded-lg flex items-center justify-center text-lg border border-slate-100">📁</span>
                        </div>
                        <h3 class="text-3xl md:text-4xl font-black text-slate-800 mt-3 md:mt-2">${siteData.stats.total}</h3>
                    </div>
                    <div class="bg-white p-5 md:p-6 rounded-2xl border border-slate-200 shadow-sm flex flex-col border-r-4 border-r-emerald-500 fade-in" style="animation-delay: 0.2s">
                         <div class="flex justify-between items-start">
                            <p class="text-slate-500 font-bold text-xs md:text-sm">المشاريع المنجزة</p>
                            <span class="bg-emerald-50 text-emerald-500 w-8 h-8 rounded-lg flex items-center justify-center text-lg border border-emerald-100">🏆</span>
                        </div>
                        <h3 class="text-3xl md:text-4xl font-black text-emerald-600 mt-3 md:mt-2">${siteData.stats.completed}</h3>
                    </div>
                    <div class="bg-white p-5 md:p-6 rounded-2xl border border-slate-200 shadow-sm flex flex-col border-r-4 border-r-amber-500 fade-in" style="animation-delay: 0.25s">
                         <div class="flex justify-between items-start">
                            <p class="text-slate-500 font-bold text-xs md:text-sm">جاري العمل</p>
                            <span class="bg-amber-50 text-amber-500 w-8 h-8 rounded-lg flex items-center justify-center text-lg border border-amber-100">⚙️</span>
                        </div>
                        <h3 class="text-3xl md:text-4xl font-black text-amber-600 mt-3 md:mt-2">${siteData.stats.inProgress}</h3>
                    </div>
                </div>
            `;
        }

        function renderControls() {
            return `
                <div class="bg-white p-4 md:p-5 rounded-2xl border border-slate-200 shadow-sm mb-6 md:mb-8 flex flex-col md:flex-row gap-4 items-center fade-in print-break" style="animation-delay: 0.1s">
                    <div class="relative w-full md:flex-grow">
                        <span class="absolute inset-y-0 right-4 flex items-center text-slate-400">🔍</span>
                        <input type="text" placeholder="ابحث برقم المشروع، العنوان، أو المشرف..." 
                               value="${state.searchQuery}" oninput="debouncedSearch(this.value)"
                               class="w-full pl-4 pr-11 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:border-blue-500 focus:bg-white focus:ring-2 focus:ring-blue-100 transition-all text-sm font-semibold text-slate-800 placeholder-slate-400">
                    </div>
                    <div class="grid grid-cols-2 md:flex gap-3 w-full md:w-auto">
                        <select onchange="handleFilter(this.value)" class="w-full md:w-40 px-3 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:border-blue-500 focus:ring-2 focus:ring-blue-100 text-sm font-semibold text-slate-700 outline-none cursor-pointer transition-all appearance-none bg-[url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%2394a3b8%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E')] bg-[length:10px_10px] bg-no-repeat bg-[position:left_12px_center]">
                            <option value="All" ${state.statusFilter === 'All' ? 'selected' : ''}>حالة المشروع: الكل</option>
                            <option value="In Progress" ${state.statusFilter === 'In Progress' ? 'selected' : ''}>جاري العمل</option>
                            <option value="Delayed" ${state.statusFilter === 'Delayed' ? 'selected' : ''}>متأخرة ⚠️</option>
                            <option value="Completed" ${state.statusFilter === 'Completed' ? 'selected' : ''}>مكتملة ✅</option>
                        </select>
                        <select onchange="handleSort(this.value)" class="w-full md:w-44 px-3 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:border-blue-500 focus:ring-2 focus:ring-blue-100 text-sm font-semibold text-slate-700 outline-none cursor-pointer transition-all appearance-none bg-[url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%2394a3b8%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E')] bg-[length:10px_10px] bg-no-repeat bg-[position:left_12px_center]">
                            <option value="default" ${state.sortFilter === 'default' ? 'selected' : ''}>الترتيب الافتراضي</option>
                            <option value="high" ${state.sortFilter === 'high' ? 'selected' : ''}>الأعلى إنجازاً</option>
                            <option value="low" ${state.sortFilter === 'low' ? 'selected' : ''}>الأقل إنجازاً</option>
                            <option value="az" ${state.sortFilter === 'az' ? 'selected' : ''}>أبجدياً (أ-ي)</option>
                        </select>
                    </div>
                </div>
            `;
        }

        function createProjectCard(project, deptCode, dIndex, pIndex, animationDelay = 0) {
            let theme = getDeptTheme(deptCode);
            let isComplete = project.completedWeeks === TOTAL_WEEKS;

            return `
                <div onclick="goProject(${dIndex}, ${pIndex})" class="bg-white p-5 md:p-6 rounded-2xl border border-slate-200 hover:border-blue-400 hover:shadow-lg active:scale-[0.98] transition-all duration-200 cursor-pointer flex flex-col h-full fade-in relative overflow-hidden" style="animation-delay: ${animationDelay}s">
                    <div class="flex justify-between items-start mb-4">
                        <span class="text-[11px] font-black text-slate-700 bg-slate-100 px-2.5 py-1 rounded-md border border-slate-200 tracking-wider">${project.id}</span>
                        ${getHealthBadge(project.completedWeeks)}
                    </div>
                    
                    <h4 class="text-sm md:text-base font-bold text-slate-800 mb-5 flex-grow leading-relaxed">${project.title}</h4>
                    
                    <div class="mb-5 bg-slate-50 p-3.5 rounded-xl border border-slate-100">
                        <div class="flex justify-between text-[11px] font-bold text-slate-500 mb-1.5">
                            <span>التقارير المنجزة (${project.completedWeeks}/${TOTAL_WEEKS})</span>
                            <span class="${isComplete ? 'text-emerald-600' : 'text-blue-600'} text-xs">${project.progress}%</span>
                        </div>
                        ${renderSegmentedBar(project.completedWeeks)}
                    </div>
                    
                    <div class="pt-4 border-t border-slate-100 text-xs text-slate-500 flex justify-between items-center font-bold">
                        <span class="truncate pr-1 bg-slate-50 px-2 py-1 rounded-md">👨‍🏫 ${project.supervisor}</span>
                        <span class="${theme.bg} ${theme.text} px-2.5 py-1 rounded-md border ${theme.border} text-[11px] shadow-sm">${deptCode}</span>
                    </div>
                </div>
            `;
        }

        function renderHome() {
            updateBreadcrumbs();
            if (state.searchQuery || state.statusFilter !== 'All' || state.sortFilter !== 'default') {
                renderSearchResults();
                return;
            }

            let html = `<div class="fade-in">${renderDashboardStats()}${renderControls()}`;

            html += `
                <div class="bg-white p-5 md:p-8 rounded-2xl border border-slate-200 shadow-sm mb-6 md:mb-8 fade-in print-break" style="animation-delay: 0.3s">
                    <h3 class="text-base md:text-lg font-bold text-slate-800 mb-4 md:mb-6 border-b border-slate-100 pb-3 flex items-center gap-2">📊 مقارنة أداء الأقسام الأكاديمية</h3>
                    <div class="h-48 md:h-64 w-full relative"><canvas id="deptChart"></canvas></div>
                </div>
                
                <h3 class="text-base md:text-lg font-bold text-slate-800 mb-4 px-1 fade-in" style="animation-delay: 0.35s">التقارير التفصيلية للأقسام</h3>
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-5 mb-8">
            `;
            
            siteData.departments.forEach((dept, index) => {
                let theme = getDeptTheme(dept.code);
                let ringColor = dept.averageProgress === 100 ? '#10b981' : theme.ring; 
                let donutStyle = `background: conic-gradient(${ringColor} ${dept.averageProgress}%, #f1f5f9 0);`;

                html += `
                    <div onclick="goDept(${index})" class="bg-white p-6 md:p-7 rounded-2xl border border-slate-200 shadow-sm hover:shadow-lg active:scale-[0.98] hover:border-slate-300 transition-all duration-200 cursor-pointer flex flex-col border-r-4 border-r-${theme.color}-500 fade-in" style="animation-delay: ${0.4 + (index * 0.05)}s">
                        <div class="flex justify-between items-center mb-6">
                            <div>
                                <h3 class="text-2xl md:text-3xl font-black text-slate-800 mb-1">${dept.code}</h3>
                                <p class="text-slate-500 font-bold text-xs md:text-sm leading-tight">${dept.name}</p>
                            </div>
                            <div class="relative w-16 h-16 md:w-18 md:h-18 rounded-full flex items-center justify-center shadow-sm" style="${donutStyle}">
                                <div class="absolute inset-[5px] bg-white rounded-full flex items-center justify-center">
                                    <span class="text-sm font-black text-slate-800">${dept.averageProgress}%</span>
                                </div>
                            </div>
                        </div>
                        <div class="pt-4 border-t border-slate-100 flex justify-between items-center mt-auto">
                            <span class="text-slate-600 text-[11px] font-black bg-slate-100 px-3 py-1.5 rounded-lg border border-slate-200 shadow-sm">${dept.projects.length} مشاريع</span>
                            <span class="text-blue-600 bg-blue-50 px-3 py-1.5 rounded-lg text-xs font-bold flex items-center gap-1 group-hover:bg-blue-100 transition-colors">استعراض المشاريع &larr;</span>
                        </div>
                    </div>
                `;
            });
            html += `</div></div>`;
            appDiv.innerHTML = html;
            initChart(); 
        }

        function initChart() {
            if(mainChartInstance) mainChartInstance.destroy();
            const ctx = document.getElementById('deptChart');
            if(!ctx) return;
            
            const labels = siteData.departments.map(d => d.code);
            const data = siteData.departments.map(d => d.averageProgress);
            const colors = siteData.departments.map(d => {
                let theme = getDeptTheme(d.code);
                return d.averageProgress === 100 ? '#10b981' : theme.ring;
            });

            mainChartInstance = new Chart(ctx, {
                type: 'bar',
                data: { labels: labels, datasets: [{ data: data, backgroundColor: colors, borderRadius: 6, borderSkipped: false, barThickness: window.innerWidth < 768 ? 20 : 36 }] },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false }, tooltip: { titleFont: { family: 'Cairo' }, bodyFont: { family: 'Cairo' } } },
                    scales: { 
                        y: { beginAtZero: true, max: 100, ticks: { font: { family: 'Cairo', size: window.innerWidth < 768 ? 10 : 12 } }, grid: { color: '#f1f5f9' }, border: { dash: [4, 4] } }, 
                        x: { ticks: { font: { family: 'Cairo', weight: 'bold', size: window.innerWidth < 768 ? 10 : 12 } }, grid: { display: false } } 
                    }
                }
            });
        }

        function renderSearchResults() {
            let html = `<div class="fade-in">${renderControls()}
                <div class="flex justify-between items-center mb-5 border-b border-slate-200 pb-3">
                    <h3 class="text-base md:text-lg font-bold text-slate-800">نتائج البحث والفرز</h3>
                    <button onclick="clearSearch()" class="bg-slate-100 hover:bg-slate-200 active:scale-95 text-slate-600 px-3 py-1.5 rounded-lg text-xs font-bold transition-all shadow-sm">إلغاء الفلاتر ✖</button>
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-5">`;
            
            let allProjects = [];
            siteData.departments.forEach((dept, dIndex) => {
                dept.projects.forEach((proj, pIndex) => { allProjects.push({ ...proj, dIndex, pIndex, deptCode: dept.code }); });
            });

            let filtered = allProjects.filter(p => {
                const searchLower = state.searchQuery.toLowerCase();
                const matchSearch = p.title.toLowerCase().includes(searchLower) || p.id.toLowerCase().includes(searchLower) || p.supervisor.toLowerCase().includes(searchLower);
                
                let matchStatus = true;
                if (state.statusFilter === 'Completed') matchStatus = p.completedWeeks === TOTAL_WEEKS;
                else if (state.statusFilter === 'In Progress') matchStatus = p.completedWeeks < TOTAL_WEEKS;
                else if (state.statusFilter === 'Delayed') matchStatus = (CURRENT_WEEK - p.completedWeeks) > 0 && p.completedWeeks < TOTAL_WEEKS;

                return matchSearch && matchStatus;
            });

            if (state.sortFilter === 'high') filtered.sort((a, b) => b.progress - a.progress);
            else if (state.sortFilter === 'low') filtered.sort((a, b) => a.progress - b.progress);
            else if (state.sortFilter === 'az') filtered.sort((a, b) => a.title.localeCompare(b.title));

            if (filtered.length === 0) {
                html += `<div class="col-span-full bg-slate-50 p-12 text-center rounded-2xl border border-slate-200 fade-in"><div class="text-4xl mb-4 opacity-50">🔍</div><p class="text-slate-600 font-bold mb-4">لم نعثر على أي نتائج مطابقة لبحثك.</p><button onclick="clearSearch()" class="bg-blue-600 text-white px-5 py-2.5 rounded-xl font-bold text-sm shadow-sm hover:bg-blue-700 active:scale-95 transition-all">إعادة ضبط الفلاتر</button></div>`;
            } else {
                filtered.forEach((p, idx) => { html += createProjectCard(p, p.deptCode, p.dIndex, p.pIndex, idx * 0.05); });
            }
            html += `</div></div>`;
            appDiv.innerHTML = html;
        }

        function renderDepartment() {
            updateBreadcrumbs();
            const dept = siteData.departments[state.activeDeptIndex];
            let theme = getDeptTheme(dept.code);
            
            let html = `
                <div class="fade-in">
                    <button onclick="goHome()" class="mb-4 text-xs md:text-sm font-bold text-slate-500 hover:text-blue-700 hover:bg-slate-100 active:scale-95 px-3 py-1.5 rounded-lg flex items-center gap-2 transition-all w-fit">
                        <span>&rarr;</span> العودة للرئيسية
                    </button>
                    
                    <div class="bg-white p-6 md:p-8 rounded-2xl border border-slate-200 shadow-sm mb-6 md:mb-8 border-r-4 border-r-${theme.color}-500 flex flex-col md:flex-row justify-between items-start md:items-center gap-6 print-break">
                        <div class="w-full md:w-auto">
                            <span class="${theme.bg} ${theme.text} text-[10px] md:text-xs font-bold px-3 py-1.5 rounded-md border ${theme.border} mb-3 inline-block shadow-sm">سجل مشاريع القسم</span>
                            <h2 class="text-2xl md:text-3xl font-black text-slate-800 mb-2">${dept.name} (${dept.code})</h2>
                            <p class="text-slate-500 text-xs md:text-sm font-semibold leading-relaxed">متابعة تسليم التقارير الأسبوعية لجميع المشاريع المعتمدة.</p>
                        </div>
                        <div class="bg-slate-50 px-6 py-5 rounded-xl border border-slate-200 text-center w-full md:min-w-[160px] flex md:flex-col justify-between items-center md:items-center">
                            <p class="text-xs text-slate-500 font-bold md:mb-1">متوسط الإنجاز</p>
                            <h3 class="text-3xl font-black ${dept.averageProgress === 100 ? 'text-emerald-600' : 'text-slate-800'}">${dept.averageProgress}%</h3>
                        </div>
                    </div>
                    ${renderControls()}
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-5">
            `;

            let deptProjects = [...dept.projects].map((p, idx) => ({...p, originalIndex: idx}));
            
            if(state.searchQuery) {
                const sqLower = state.searchQuery.toLowerCase();
                deptProjects = deptProjects.filter(p => p.title.toLowerCase().includes(sqLower) || p.id.toLowerCase().includes(sqLower) || p.supervisor.toLowerCase().includes(sqLower));
            }
            if(state.statusFilter !== 'All') {
                deptProjects = deptProjects.filter(p => {
                    if (state.statusFilter === 'Completed') return p.completedWeeks === TOTAL_WEEKS;
                    if (state.statusFilter === 'In Progress') return p.completedWeeks < TOTAL_WEEKS;
                    if (state.statusFilter === 'Delayed') return (CURRENT_WEEK - p.completedWeeks) > 0 && p.completedWeeks < TOTAL_WEEKS;
                    return true;
                });
            }
            if (state.sortFilter === 'high') deptProjects.sort((a, b) => b.progress - a.progress);
            else if (state.sortFilter === 'low') deptProjects.sort((a, b) => a.progress - b.progress);
            else if (state.sortFilter === 'az') deptProjects.sort((a, b) => a.title.localeCompare(b.title));

            if(deptProjects.length === 0) {
                html += `<div class="col-span-full bg-slate-50 p-12 text-center rounded-2xl border border-slate-200 fade-in"><p class="text-slate-500 font-bold">لا توجد مشاريع مضافة أو مطابقة للبحث.</p></div>`;
            } else {
                deptProjects.forEach((p, idx) => { html += createProjectCard(p, dept.code, state.activeDeptIndex, p.originalIndex, idx * 0.05); });
            }
            html += `</div></div>`;
            appDiv.innerHTML = html;
        }

        function renderProject() {
            updateBreadcrumbs();
            const dept = siteData.departments[state.activeDeptIndex];
            const project = dept.projects[state.activeProjIndex];
            let isComplete = project.completedWeeks === TOTAL_WEEKS;

            let html = `
                <div class="fade-in max-w-4xl mx-auto">
                    <div class="flex items-center gap-4 mb-4">
                        <button onclick="goDept(${state.activeDeptIndex})" class="text-xs md:text-sm font-bold text-slate-500 hover:text-blue-700 hover:bg-slate-100 active:scale-95 px-3 py-1.5 rounded-lg flex items-center gap-2 transition-all w-fit">
                            <span>&rarr;</span> العودة لقائمة القسم
                        </button>
                    </div>

                    <div class="bg-white p-5 md:p-10 rounded-3xl shadow-sm border border-slate-200 overflow-hidden relative">
                        <div class="absolute top-0 right-0 w-full h-2 bg-gradient-to-l from-blue-600 to-indigo-500"></div>
                        
                        <div class="border-b border-slate-100 pb-6 mb-6 mt-2">
                            <div class="flex flex-wrap justify-between items-center gap-3 mb-4">
                                <span class="bg-slate-50 text-slate-700 text-[11px] md:text-xs font-black px-3.5 py-1.5 rounded-md border border-slate-200 tracking-wider shadow-sm">المرجع: ${project.id}</span>
                                ${getHealthBadge(project.completedWeeks)}
                            </div>
                            <h2 class="text-xl md:text-3xl font-black text-slate-800 leading-snug md:leading-tight mb-2">${project.title}</h2>
                        </div>

                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-8">
                            <div class="bg-slate-50 p-4 md:p-5 rounded-2xl border border-slate-100 flex items-center gap-4">
                                <div class="bg-white w-12 h-12 rounded-full flex items-center justify-center text-xl shadow-sm border border-slate-100 flex-shrink-0">👨‍🏫</div>
                                <div>
                                    <p class="text-[10px] md:text-xs text-slate-500 font-bold mb-0.5">المشرف الأكاديمي</p>
                                    <p class="font-black text-slate-800 text-sm md:text-base">${project.supervisor}</p>
                                </div>
                            </div>
                            <div class="bg-slate-50 p-4 md:p-5 rounded-2xl border border-slate-100 flex items-center gap-4">
                                <div class="bg-white w-12 h-12 rounded-full flex items-center justify-center text-xl shadow-sm border border-slate-100 flex-shrink-0">🏢</div>
                                <div>
                                    <p class="text-[10px] md:text-xs text-slate-500 font-bold mb-0.5">القسم الأكاديمي</p>
                                    <p class="font-black text-slate-800 text-sm md:text-base">${dept.name} (${dept.code})</p>
                                </div>
                            </div>
                        </div>

                        <div class="mb-8 bg-white p-5 md:p-7 rounded-2xl border border-slate-200 shadow-sm relative overflow-hidden">
                            <div class="absolute inset-0 bg-blue-50/50"></div>
                            <div class="relative z-10">
                                <div class="flex justify-between items-end mb-4">
                                    <div>
                                        <h4 class="font-black text-slate-800 mb-1.5 text-sm md:text-base">سجل التقارير الأسبوعية</h4>
                                        <p class="text-[11px] md:text-xs text-slate-600 font-semibold">تم تسليم <span class="text-blue-700 font-bold">${project.completedWeeks}</span> من أصل ${TOTAL_WEEKS} تقارير مطلوبة.</p>
                                    </div>
                                    <span class="text-3xl font-black ${isComplete ? 'text-emerald-600' : 'text-blue-600'}">${project.progress}%</span>
                                </div>
                                ${renderSegmentedBar(project.completedWeeks)}
                            </div>
                        </div>

                        <div class="flex flex-col sm:flex-row gap-3 md:gap-4 pt-2">
                            <a href="${project.student_url}" target="_blank" class="flex-1 bg-white hover:bg-slate-50 active:scale-[0.98] text-slate-700 p-4 rounded-xl border-2 border-slate-200 transition-all flex items-center justify-center gap-3 font-black text-sm md:text-base shadow-sm group">
                                <span class="text-xl group-hover:scale-110 transition-transform">📁</span> سجل ملفات المشروع
                            </a>
                            <a href="${project.tamkeen_url}" target="_blank" class="flex-1 bg-slate-900 hover:bg-slate-800 active:scale-[0.98] text-white p-4 rounded-xl transition-all flex items-center justify-center gap-3 font-black text-sm md:text-base shadow-md group">
                                <span class="text-xl group-hover:scale-110 transition-transform">🔐</span> لوحة التقييم والاعتماد
                            </a>
                        </div>
                    </div>
                </div>
            `;
            appDiv.innerHTML = html;
        }

        function goHome() { window.scrollTo({top: 0, behavior: 'smooth'}); state.view = 'home'; state.activeDeptIndex = null; state.activeProjIndex = null; renderHome(); }
        function goDept(dIndex) { window.scrollTo({top: 0, behavior: 'smooth'}); state.view = 'dept'; state.activeDeptIndex = dIndex; state.activeProjIndex = null; renderDepartment(); }
        function goProject(dIndex, pIndex) { window.scrollTo({top: 0, behavior: 'smooth'}); state.view = 'project'; state.activeDeptIndex = dIndex; state.activeProjIndex = pIndex; renderProject(); }
        
        function debouncedSearch(q) {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => { state.searchQuery = q; reRenderCurrentView(); }, 300);
        }
        function handleFilter(s) { state.statusFilter = s; reRenderCurrentView(); }
        function handleSort(s) { state.sortFilter = s; reRenderCurrentView(); }
        function clearSearch() { state.searchQuery = ''; state.statusFilter = 'All'; state.sortFilter = 'default'; reRenderCurrentView(); }
        function reRenderCurrentView() { if(state.view === 'home') renderHome(); else if(state.view === 'dept') renderDepartment(); }

        fetchAndBuildData();
    </script>
</body>
</html>
