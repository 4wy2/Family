<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شجرة العائلة الكبرى</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Scheherazade+New:wght@400;700&display=swap" rel="stylesheet">

    <script src="https://d3js.org/d3.v7.min.js"></script>
    
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/tree-styles.css"> </head>
<body>

    <header id="top-bar">
        <div class="search-container">
            <input type="text" id="search-input" placeholder="ابحث عن اسم فرد...">
            <button id="search-btn">بحث</button>
        </div>
        <h1>شجرة الأشراف</h1>
    </header>

    <div id="tree-viewport">
        <svg id="main-svg"></svg>
    </div>

    <div class="controls">
        <button id="zoom-in" title="تكبير">+</button>
        <button id="zoom-out" title="تصغير">-</button>
        <button id="reset-view" title="إعادة ضبط">🏠</button>
    </div>

    <script type="module" src="js/main.js"></script> 
</body>
</html>
